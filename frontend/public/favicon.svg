<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 深色背景圆角方块 -->
  <rect width="64" height="64" rx="14" fill="#0f0f0f"/>

  <!-- 屏幕外框（红色圆角矩形，仿 YouTube 风格） -->
  <rect x="6" y="14" width="52" height="36" rx="7" fill="#ff0000"/>

  <!-- 屏幕内框（深色，模拟屏幕） -->
  <rect x="10" y="18" width="44" height="28" rx="4" fill="#181818"/>

  <!-- 播放三角形（白色居中） -->
  <polygon points="25,24 25,40 44,32" fill="#ffffff"/>

  <!-- 底部天线左 -->
  <rect x="22" y="50" width="4" height="8" rx="2" fill="#aaaaaa"/>

  <!-- 底部天线右 -->
  <rect x="38" y="50" width="4" height="8" rx="2" fill="#aaaaaa"/>

  <!-- 底座 -->
  <rect x="18" y="57" width="28" height="4" rx="2" fill="#aaaaaa"/>
</svg>
