services:
  tubehub:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
    image: tubehub:latest
    container_name: tubehub
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 数据目录挂载到 HDD（/home 在 /dev/sda1，644G 可用）
      # /home/tubehub/data  → 存放 DB、视频、缩略图、cookies
      # /home/tubehub/logs  → 存放运行日志
      - /home/tubehub/data:/app/data
      - /home/tubehub/logs:/app/logs
    environment:
      - PYTHONPATH=/app/backend
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1
      - SECRET_KEY=${SECRET_KEY:-tubehub-change-me-in-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
