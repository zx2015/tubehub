services:
  tubehub:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        - HTTP_PROXY=http://10.182.67.191:8080
        - HTTPS_PROXY=http://10.182.67.191:8080
    container_name: tubehub
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /home/tubehub/repo/backend/app:/app/backend/app:ro
      - /home/tubehub/repo/data:/app/data
      - /home/tubehub/repo/logs:/app/logs
    environment:
      - PYTHONPATH=/app/backend
      - HTTP_PROXY=http://10.182.67.191:8080
      - HTTPS_PROXY=http://10.182.67.191:8080
      - NO_PROXY=localhost,127.0.0.1
      - SECRET_KEY=99a38f3214daef129487bcda12487ab1
      - SESSION_SECRET_KEY=29b1056acdf129bcba13697de831a29b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
